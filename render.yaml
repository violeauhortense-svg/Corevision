services:
  - type: web
    name: corevision-api
    env: docker
    plan: standard
    region: frankfurt
    numInstances: 1

    # Envs - À remplir depuis Render dashboard
    envVars:
      - key: PORT
        value: "3000"
      - key: DATA_DIR
        value: "/data"
      - key: UPLOADS_DIR
        value: "/uploads"
      - key: JWT_SECRET
        value: "change-me-in-production-min-32-chars!!"
      - key: API_BASE_URL
        value: "https://corevision-fnid.onrender.com"
      - key: NODE_ENV
        value: "production"

    # Health check
    healthCheckPath: /make-server-cac859af/health

    # Auto-deploy on push
    autoDeploy: true
