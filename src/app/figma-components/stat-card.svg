<svg width="280" height="140" viewBox="0 0 280 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="stat-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Card Background -->
  <rect x="0" y="0" width="280" height="140" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1" filter="url(#stat-shadow)"/>
  
  <!-- Icon Container -->
  <rect x="24" y="24" width="48" height="48" rx="12" fill="#DBEAFE"/>
  
  <!-- Icon (Users) -->
  <circle cx="48" cy="48" r="6" fill="#2563EB"/>
  <path d="M 36 58 Q 36 52, 42 52 L 54 52 Q 60 52, 60 58" stroke="#2563EB" stroke-width="2" fill="none"/>
  
  <!-- Value -->
  <text x="24" y="104" font-family="Inter, -apple-system, sans-serif" font-size="30" font-weight="700" fill="#111827">247</text>
  
  <!-- Label -->
  <text x="24" y="126" font-family="Inter, -apple-system, sans-serif" font-size="14" fill="#6B7280">Clients actifs</text>
</svg>
