<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333EA;stop-opacity:1" />
    </linearGradient>
    <filter id="logo-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="7.5"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect x="0" y="0" width="64" height="64" rx="16" fill="url(#logo-gradient)" filter="url(#logo-shadow)"/>
  
  <!-- Icon CRM (3 personnes) -->
  <circle cx="32" cy="24" r="4" fill="white"/>
  <circle cx="20" cy="28" r="3" fill="white" opacity="0.8"/>
  <circle cx="44" cy="28" r="3" fill="white" opacity="0.8"/>
  
  <path d="M 26 38 Q 26 34, 28 34 L 36 34 Q 38 34, 38 38" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 16 42 Q 16 39, 18 39 L 24 39" stroke="white" stroke-width="1.5" fill="none" opacity="0.8" stroke-linecap="round"/>
  <path d="M 40 39 L 46 39 Q 48 39, 48 42" stroke="white" stroke-width="1.5" fill="none" opacity="0.8" stroke-linecap="round"/>
</svg>
