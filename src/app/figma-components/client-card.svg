<svg width="320" height="220" viewBox="0 0 320 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="client-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="avatar-gradient-client" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333EA;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Card Background -->
  <rect x="0" y="0" width="320" height="220" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1" filter="url(#client-shadow)"/>
  
  <!-- Avatar -->
  <circle cx="56" cy="48" r="32" fill="url(#avatar-gradient-client)"/>
  <text x="56" y="58" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="700" fill="white" text-anchor="middle">JD</text>
  
  <!-- Name -->
  <text x="24" y="108" font-family="Inter, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#111827">Jean Dupont</text>
  
  <!-- Email -->
  <text x="24" y="134" font-family="Inter, -apple-system, sans-serif" font-size="14" fill="#6B7280">✉ jean.dupont@email.fr</text>
  
  <!-- Phone -->
  <text x="24" y="156" font-family="Inter, -apple-system, sans-serif" font-size="14" fill="#6B7280">📱 06 12 34 56 78</text>
  
  <!-- Badge -->
  <rect x="24" y="172" width="60" height="24" rx="12" fill="#F3E8FF"/>
  <text x="54" y="188" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#7E22CE" text-anchor="middle">R0</text>
  
  <!-- Separator -->
  <line x1="24" y1="182" x2="296" y2="182" stroke="#F3F4F6" stroke-width="1"/>
  
  <!-- Patrimoine Label -->
  <text x="24" y="206" font-family="Inter, -apple-system, sans-serif" font-size="14" fill="#6B7280">Patrimoine</text>
  
  <!-- Patrimoine Value -->
  <text x="296" y="206" font-family="Inter, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="end">450K€</text>
</svg>
