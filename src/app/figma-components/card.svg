<svg width="320" height="200" viewBox="0 0 320 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="card-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="320" height="200" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1" filter="url(#card-shadow)"/>
  <text x="24" y="40" font-family="Inter, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#111827">Card Component</text>
  <text x="24" y="70" font-family="Inter, -apple-system, sans-serif" font-size="14" fill="#6B7280">Contenu de la card avec padding 24px</text>
  <text x="24" y="95" font-family="Inter, -apple-system, sans-serif" font-size="14" fill="#6B7280">Border radius 12px</text>
  <text x="24" y="120" font-family="Inter, -apple-system, sans-serif" font-size="14" fill="#6B7280">Shadow subtle</text>
</svg>
