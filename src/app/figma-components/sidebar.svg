<svg width="256" height="800" viewBox="0 0 256 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sidebar-logo-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333EA;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="0" y="0" width="256" height="800" fill="white"/>
  <line x1="255.5" y1="0" x2="255.5" y2="800" stroke="#E5E7EB" stroke-width="1"/>
  
  <!-- Header Section -->
  <rect x="0" y="0" width="256" height="88" fill="white"/>
  <line x1="0" y1="88" x2="256" y2="88" stroke="#E5E7EB" stroke-width="1"/>
  
  <!-- Logo -->
  <rect x="24" y="24" width="40" height="40" rx="10" fill="url(#sidebar-logo-gradient)"/>
  <circle cx="44" cy="36" r="3" fill="white"/>
  <path d="M 38 46 Q 38 43, 40 43 L 48 43 Q 50 43, 50 46" stroke="white" stroke-width="1.5" fill="none"/>
  
  <!-- CRM CGP Text -->
  <text x="72" y="42" font-family="Inter, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#111827">CRM CGP</text>
  <text x="72" y="57" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#6B7280">Gestion Patrimoine</text>
  
  <!-- Navigation Items -->
  <!-- Dashboard (Active) -->
  <rect x="16" y="104" width="224" height="48" rx="8" fill="#EFF6FF"/>
  <rect x="24" y="118" width="20" height="20" rx="2" stroke="#1D4ED8" stroke-width="2" fill="none"/>
  <text x="56" y="135" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#1D4ED8">Dashboard</text>
  
  <!-- Clients -->
  <rect x="16" y="160" width="224" height="48" rx="8" fill="transparent"/>
  <circle cx="34" cy="184" r="8" stroke="#374151" stroke-width="2" fill="none"/>
  <text x="56" y="191" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#374151">Clients</text>
  
  <!-- Agenda -->
  <rect x="16" y="216" width="224" height="48" rx="8" fill="transparent"/>
  <rect x="24" y="230" width="20" height="20" rx="3" stroke="#374151" stroke-width="2" fill="none"/>
  <text x="56" y="247" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#374151">Agenda</text>
  
  <!-- To-Do -->
  <rect x="16" y="272" width="224" height="48" rx="8" fill="transparent"/>
  <rect x="26" y="284" width="16" height="16" rx="3" stroke="#374151" stroke-width="2" fill="none"/>
  <path d="M 29 292 L 33 296 L 40 288" stroke="#374151" stroke-width="2" fill="none"/>
  <text x="56" y="303" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#374151">Tâches</text>
  
  <!-- Documents -->
  <rect x="16" y="328" width="224" height="48" rx="8" fill="transparent"/>
  <rect x="24" y="340" width="18" height="22" rx="2" stroke="#374151" stroke-width="2" fill="none"/>
  <line x1="28" y1="346" x2="38" y2="346" stroke="#374151" stroke-width="1.5"/>
  <line x1="28" y1="351" x2="38" y2="351" stroke="#374151" stroke-width="1.5"/>
  <text x="56" y="359" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#374151">Documents</text>
  
  <!-- Footer Section -->
  <line x1="0" y1="712" x2="256" y2="712" stroke="#E5E7EB" stroke-width="1"/>
  
  <!-- User Profile -->
  <circle cx="40" cy="748" r="20" fill="url(#sidebar-logo-gradient)"/>
  <text x="40" y="755" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">JD</text>
  
  <text x="72" y="744" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#111827">Jean Dupont</text>
  <text x="72" y="761" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#6B7280">CGP Certifié</text>
